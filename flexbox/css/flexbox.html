<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        .container{
            display: flex;
            gap: 10px;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            align-content: center;
        }

        .box{
            background-color: aqua;
            padding: 20px;
            flex-basis: 200px;
        }

        .box1{
            height: 300px;
            order: 2;
            flex-grow: 1;
            flex-shrink: 0;
        }

        .box2{
            order: 3;
        }

        .box3{
            order: 1;
            align-self: flex-start;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">box1</div>
        <div class="box box2">box2</div>
        <div class="box box3">box3</div>
    </div>
</body>
</html>
